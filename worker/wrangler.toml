name = "kiln-auth"
main = "index.js"
compatibility_date = "2026-06-01"

# Site origins allowed to authenticate through this worker (comma-separated).
# localhost entries are for `wrangler pages dev` testing.
[vars]
ALLOWED_ORIGINS = "https://kiln-demo.pages.dev,http://localhost:8788,http://127.0.0.1:8788"

# KV: app credentials, OAuth state nonces, sessions, invites, installation-token cache.
[[kv_namespaces]]
binding = "KILN"
id = "376ca9e637724d9fabebbc24ba149814"

# Scheduled publishing: commit due posts every 5 minutes.
[triggers]
crons = ["*/5 * * * *"]
