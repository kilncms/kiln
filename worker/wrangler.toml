name = "kiln-auth"
main = "index.js"
compatibility_date = "2026-06-01"
workers_dev = true   # keep kiln-auth.erikkwilder.workers.dev live alongside the custom domain

# Site origins allowed to authenticate through this worker (comma-separated).
# localhost entries are for `wrangler pages dev` testing.
# SELF-HOSTERS: replace the value below with your OWN site origin(s), or just
# run `npx github:kilncms/kiln` and the wizard will set this for you.
[vars]
ALLOWED_ORIGINS = "https://demo.kilncms.com,https://kiln-demo.pages.dev,https://npu-i.pages.dev,https://app.kilncms.com,http://localhost:8788,http://127.0.0.1:8788"
CLOUD_DASHBOARD = "https://app.kilncms.com"   # where /cloud/callback returns the customer
CLOUD_ADMIN = "erikkurtu"                      # GitHub login allowed to hit /admin/cloud/*

# KV: app credentials, OAuth state nonces, sessions, the People allowlist, installation-token cache.
# SELF-HOSTERS: replace this `id` with the id of a KV namespace YOU created
# (`npx wrangler kv namespace create KILN`), or let `npx github:kilncms/kiln` do it.
[[kv_namespaces]]
binding = "KILN"
id = "376ca9e637724d9fabebbc24ba149814"

# D1: Kiln Cloud accounts, sites, and subscription status (the hosted tier).
# Only the canonical Kiln Cloud instance needs this; self-host/demo never touch it.
[[d1_databases]]
binding = "kiln_cloud"
database_name = "kiln-cloud"
database_id = "a00713f4-3838-49fd-9e53-58961b1feb2e"

# Scheduled publishing: commit due posts every 5 minutes.
# Only needed if you use Kiln's "schedule this post" feature; safe to remove otherwise.
[triggers]
crons = ["*/5 * * * *"]

# Rate limiting (on by default): per-IP throttle on the abuse-prone sign-in routes
# /google/login, /google/claim, and /setup/install-check. The guard in index.js is
# a no-op if this binding is ever removed, so it degrades safely.
[[unsafe.bindings]]
name = "RL"
type = "ratelimit"
namespace_id = "1001"          # any unique number across your worker's limiters
simple = { limit = 20, period = 60 }   # 20 requests per 60s per IP

# Canonical instance only: branded custom domain for the worker (so the Google
# redirect is auth.kilncms.com). SELF-HOSTERS: delete this [[routes]] block — you
# don't own kilncms.com. The setup wizard never includes it.
[[routes]]
pattern = "auth.kilncms.com"
custom_domain = true

# ─────────────────────────────────────────────────────────────────────────────
# TEST / STAGING ENVIRONMENT (kiln-auth-staging.erikkwilder.workers.dev)
#
# A fully isolated copy of the backend: its OWN KV namespace and D1 database, so
# nothing here touches production data, real customers, or real money. Deploy to
# it with `npm run deploy:test` (from the repo root). Use it to click through
# changes on real infrastructure before promoting to prod with `npm run deploy:prod`.
# See ENVIRONMENTS.md.
# ─────────────────────────────────────────────────────────────────────────────
[env.staging]
name = "kiln-auth-staging"
workers_dev = true
# CRITICAL: explicitly no routes. Without this, a named env inherits the
# top-level [[routes]] (auth.kilncms.com custom domain) and a staging deploy
# would hijack the production domain. Keep this empty.
routes = []

[env.staging.vars]
# Staging site origins (preview deploys + localhost for `npm run dev`).
ALLOWED_ORIGINS = "https://staging.kilncms.com,https://kiln-demo.pages.dev,http://localhost:8788,http://localhost:8787,http://127.0.0.1:8788"
CLOUD_DASHBOARD = "https://staging-app.kilncms.com"
CLOUD_ADMIN = "erikkurtu"

[[env.staging.kv_namespaces]]
binding = "KILN"
id = "5900a59cba9e48568d9886d975571fd9"   # KILN_STAGING (isolated from prod)

[[env.staging.d1_databases]]
binding = "kiln_cloud"
database_name = "kiln-cloud-staging"
database_id = "153c3353-6e1e-4d18-a2b8-9f7b50f517ba"

[env.staging.triggers]
crons = ["*/5 * * * *"]

# NOTE: staging has no [[routes]] block on purpose — it lives on the free
# kiln-auth-staging.erikkwilder.workers.dev hostname, so it never collides with
# the branded auth.kilncms.com production domain.
